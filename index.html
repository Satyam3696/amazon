<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Server</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #D24939;
        }

        a {
            text-decoration: none;
            background-color: #D24939;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }

        a:hover {
            background-color: #b6382a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jenkins CI/CD Server</h1>

        <p>Welcome to the Jenkins Automation Server.</p>

        <p>Click below to access Jenkins Dashboard.</p>

        <a href="http://YOUR_JENKINS_IP:8080" target="_blank">
            Open Jenkins
        </a>
    </div>

</body>
</html>
